<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4CAF50">
    <title>Time Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.18);
            color: white;
            padding: 60px 20px 30px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 5px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 16px;
            opacity: 0.95;
            color: rgba(255,255,255,0.9);
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .status-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .session-name-selector {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .session-name-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        #session-name-select,
        #custom-session-name {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            background: white;
            transition: all 0.3s ease;
            outline: none;
        }

        #session-name-select:focus,
        #custom-session-name:focus {
            border-color: rgba(102, 126, 234, 0.8);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #custom-session-name {
            margin-top: 10px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
        }

        .status-dot.active {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
            }
            50% {
                box-shadow: 0 0 25px rgba(76, 175, 80, 0.8);
            }
        }

        .status-dot.inactive {
            background: linear-gradient(135deg, #ccc, #999);
        }

        .status-label {
            font-size: 14px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .status-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .duration-display {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-top: 10px;
        }

        .button-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn {
            flex: 1;
            padding: 22px;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            background: linear-gradient(135deg, #e0e0e0, #bdbdbd) !important;
            cursor: not-allowed;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn-clock-in {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
        }

        .btn-clock-out {
            background: linear-gradient(135deg, #f44336, #e57373);
        }

        .btn-check {
            background: linear-gradient(135deg, #2196F3, #42A5F5);
            width: 100%;
        }

        .tabs {
            display: flex;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .tab {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .history-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .session-count {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .session-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 22px;
            border-radius: 20px;
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .session-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .session-header > div:first-child {
            display: flex;
            flex-direction: column;
        }

        .session-name-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            width: fit-content;
        }

        .session-date {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        .duration-badge {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
            padding: 8px 16px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .time-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .time-item {
            text-align: center;
        }

        .time-label {
            font-size: 12px;
            color: #999;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .time-value {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .time-separator {
            font-size: 24px;
            color: #ddd;
            font-weight: 300;
        }

        .calendar {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-title {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-nav button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            transition: all 0.2s;
        }

        .calendar-nav button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 12px;
            color: #999;
            font-weight: 700;
            padding: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            color: #333;
        }

        .calendar-day:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            transform: scale(1.05);
        }

        .calendar-day.other-month {
            color: #ccc;
        }

        .calendar-day.has-session::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 6px;
            height: 6px;
            background: linear-gradient(135deg, #2196F3, #42A5F5);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(33, 150, 243, 0.6);
        }

        .calendar-day.selected {
            background: linear-gradient(135deg, #2196F3, #42A5F5);
            color: white;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.7);
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
        }

        .delete-btn {
            background: linear-gradient(135deg, #f44336, #e57373);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
            transition: all 0.2s;
        }

        .delete-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(244, 67, 54, 0.4);
        }

        .delete-btn:active {
            transform: scale(0.98);
        }

        .chart-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Time Tracker</h1>
        <p>Track your working hours</p>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('timer')">Timer</button>
            <button class="tab" onclick="switchTab('calendar')">Calendar</button>
            <button class="tab" onclick="switchTab('history')">History</button>
        </div>

        <!-- Timer Tab -->
        <div id="timer-tab" class="tab-content active">
            <div class="status-card">
                <div class="session-name-selector">
                    <label class="session-name-label">Session Name</label>
                    <select id="session-name-select" onchange="handleSessionNameChange()">
                        <option value="Work">Work</option>
                        <option value="Meeting">Meeting</option>
                        <option value="Break">Break</option>
                        <option value="Custom">Custom...</option>
                    </select>
                    <input type="text" id="custom-session-name" placeholder="Enter custom name" style="display: none;">
                </div>
            </div>

            <div class="status-card">
                <div class="status-badge">
                    <div class="status-dot" id="status-dot"></div>
                    <div class="status-label" id="status-label">No Active Session</div>
                </div>
                <div class="status-text" id="status-text">Ready to clock in</div>
                <div class="duration-display" id="duration-display"></div>
            </div>

            <div class="button-row">
                <button class="btn btn-clock-in" id="clock-in-btn" onclick="clockIn()">
                    Clock In
                </button>
                <button class="btn btn-clock-out" id="clock-out-btn" onclick="clockOut()" disabled>
                    Clock Out
                </button>
            </div>

            <button class="btn btn-check" id="check-btn" onclick="checkDuration()" disabled>
                Check Duration
            </button>
        </div>

        <!-- Calendar Tab -->
        <div id="calendar-tab" class="tab-content">
            <div class="calendar">
                <div class="calendar-header">
                    <div class="calendar-title" id="calendar-month"></div>
                    <div class="calendar-nav">
                        <button onclick="previousMonth()">◀</button>
                        <button onclick="nextMonth()">▶</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>
            <div id="calendar-sessions"></div>
        </div>

        <!-- History Tab -->
        <div id="history-tab" class="tab-content">
            <div class="history-header">
                <div class="history-title">Analytics</div>
                <div class="session-count" id="session-count">0</div>
            </div>
            
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-label">Average Clock In</div>
                    <div class="stat-value" id="avg-clock-in">--:--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Average Clock Out</div>
                    <div class="stat-value" id="avg-clock-out">--:--</div>
                </div>
            </div>
            
            <div class="chart-container">
                <h3 class="chart-title">Clock In Times</h3>
                <canvas id="clockInChart"></canvas>
            </div>
            
            <div class="chart-container">
                <h3 class="chart-title">Clock Out Times</h3>
                <canvas id="clockOutChart"></canvas>
            </div>
            
            <div class="history-header" style="margin-top: 30px;">
                <div class="history-title">Recent Sessions</div>
            </div>
            <div id="session-list"></div>
        </div>
    </div>

    <script>
        // State
        let clockInTime = null;
        let sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
        let currentMonth = new Date();
        let selectedDate = null;
        let currentSessionName = 'Work';

        // Convert stored sessions back to Date objects
        sessions = sessions.map(s => ({
            ...s,
            clockIn: new Date(s.clockIn),
            clockOut: new Date(s.clockOut)
        }));

        // Session name handling
        function handleSessionNameChange() {
            const select = document.getElementById('session-name-select');
            const customInput = document.getElementById('custom-session-name');
            
            if (select.value === 'Custom') {
                customInput.style.display = 'block';
                customInput.focus();
                currentSessionName = customInput.value || 'Custom';
            } else {
                customInput.style.display = 'none';
                currentSessionName = select.value;
            }
        }

        // Initialize custom input handler
        window.addEventListener('DOMContentLoaded', function() {
            const customInput = document.getElementById('custom-session-name');
            if (customInput) {
                customInput.addEventListener('input', function() {
                    currentSessionName = this.value || 'Custom';
                });
            }
        });

        // Format functions
        function formatTime(date) {
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        function formatTimeShort(date) {
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        function formatDate(date) {
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function formatDuration(ms) {
            const hours = Math.floor(ms / (1000 * 60 * 60));
            const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((ms % (1000 * 60)) / 1000);
            return `${hours}h ${minutes}m ${seconds}s`;
        }

        // Timer functions
        function clockIn() {
            clockInTime = new Date();
            document.getElementById('status-dot').classList.add('active');
            document.getElementById('status-label').textContent = 'Active Session';
            document.getElementById('status-text').textContent = `Started at ${formatTime(clockInTime)}`;
            document.getElementById('clock-in-btn').disabled = true;
            document.getElementById('clock-out-btn').disabled = false;
            document.getElementById('check-btn').disabled = false;
            document.getElementById('duration-display').textContent = '';
        }

        function clockOut() {
            if (!clockInTime) return;

            const clockOutTime = new Date();
            const duration = clockOutTime - clockInTime;
            const durationString = formatDuration(duration);

            sessions.push({
                clockIn: clockInTime,
                clockOut: clockOutTime,
                duration: durationString,
                name: currentSessionName
            });

            localStorage.setItem('sessions', JSON.stringify(sessions));

            clockInTime = null;
            document.getElementById('status-dot').classList.remove('active');
            document.getElementById('status-label').textContent = 'No Active Session';
            document.getElementById('status-text').textContent = 'Ready to clock in';
            document.getElementById('duration-display').textContent = '';
            document.getElementById('clock-in-btn').disabled = false;
            document.getElementById('clock-out-btn').disabled = true;
            document.getElementById('check-btn').disabled = true;

            renderHistory();
            renderCalendar();
        }

        function checkDuration() {
            if (!clockInTime) return;
            const now = new Date();
            const duration = now - clockInTime;
            document.getElementById('duration-display').textContent = formatDuration(duration);
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');

            if (tabName === 'history') renderHistory();
            if (tabName === 'calendar') renderCalendar();
        }

        // History rendering
        let clockInChart = null;
        let clockOutChart = null;

        function renderHistory() {
            const list = document.getElementById('session-list');
            document.getElementById('session-count').textContent = sessions.length;

            // Calculate and display averages
            if (sessions.length > 0) {
                // Calculate average clock in time
                const totalClockInMinutes = sessions.reduce((sum, session) => {
                    const hours = session.clockIn.getHours();
                    const minutes = session.clockIn.getMinutes();
                    return sum + (hours * 60 + minutes);
                }, 0);
                const avgClockInMinutes = totalClockInMinutes / sessions.length;
                const avgClockInHours = Math.floor(avgClockInMinutes / 60);
                const avgClockInMins = Math.round(avgClockInMinutes % 60);
                document.getElementById('avg-clock-in').textContent = 
                    `${avgClockInHours.toString().padStart(2, '0')}:${avgClockInMins.toString().padStart(2, '0')}`;

                // Calculate average clock out time
                const totalClockOutMinutes = sessions.reduce((sum, session) => {
                    const hours = session.clockOut.getHours();
                    const minutes = session.clockOut.getMinutes();
                    return sum + (hours * 60 + minutes);
                }, 0);
                const avgClockOutMinutes = totalClockOutMinutes / sessions.length;
                const avgClockOutHours = Math.floor(avgClockOutMinutes / 60);
                const avgClockOutMins = Math.round(avgClockOutMinutes % 60);
                document.getElementById('avg-clock-out').textContent = 
                    `${avgClockOutHours.toString().padStart(2, '0')}:${avgClockOutMins.toString().padStart(2, '0')}`;
            } else {
                document.getElementById('avg-clock-in').textContent = '--:--';
                document.getElementById('avg-clock-out').textContent = '--:--';
            }

            // Render charts
            renderCharts();

            // Render session list
            if (sessions.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-state-text">No sessions recorded yet</div></div>';
                return;
            }

            list.innerHTML = sessions.slice().reverse().map((session, index) => `
                <div class="session-card">
                    <div class="session-header">
                        <div>
                            <div class="session-name-badge">${session.name || 'Work'}</div>
                            <div class="session-date">${formatDate(session.clockIn)}</div>
                        </div>
                        <div class="duration-badge">${session.duration}</div>
                    </div>
                    <div class="time-row">
                        <div class="time-item">
                            <div class="time-label">IN</div>
                            <div class="time-value">${formatTimeShort(session.clockIn)}</div>
                        </div>
                        <div class="time-separator">→</div>
                        <div class="time-item">
                            <div class="time-label">OUT</div>
                            <div class="time-value">${formatTimeShort(session.clockOut)}</div>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteSession(${sessions.length - 1 - index})">Delete</button>
                </div>
            `).join('');
        }

        function renderCharts() {
            if (sessions.length === 0) {
                return;
            }

            // Get last 14 sessions for better visualization
            const recentSessions = sessions.slice(-14);
            
            // Prepare data
            const labels = recentSessions.map(s => formatDate(s.clockIn));
            const clockInTimes = recentSessions.map(s => {
                const hours = s.clockIn.getHours();
                const minutes = s.clockIn.getMinutes();
                return hours + minutes / 60;
            });
            const clockOutTimes = recentSessions.map(s => {
                const hours = s.clockOut.getHours();
                const minutes = s.clockOut.getMinutes();
                return hours + minutes / 60;
            });

            // Destroy existing charts if they exist
            if (clockInChart) {
                clockInChart.destroy();
            }
            if (clockOutChart) {
                clockOutChart.destroy();
            }

            // Clock In Chart
            const ctxIn = document.getElementById('clockInChart').getContext('2d');
            clockInChart = new Chart(ctxIn, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Clock In Time',
                        data: clockInTimes,
                        borderColor: 'rgba(76, 175, 80, 1)',
                        backgroundColor: 'rgba(76, 175, 80, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: 'rgba(76, 175, 80, 1)',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 7,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const hours = Math.floor(context.parsed.y);
                                    const minutes = Math.round((context.parsed.y - hours) * 60);
                                    return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 0,
                            max: 24,
                            ticks: {
                                stepSize: 2,
                                callback: function(value) {
                                    return `${Math.floor(value).toString().padStart(2, '0')}:00`;
                                }
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    }
                }
            });

            // Clock Out Chart
            const ctxOut = document.getElementById('clockOutChart').getContext('2d');
            clockOutChart = new Chart(ctxOut, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Clock Out Time',
                        data: clockOutTimes,
                        borderColor: 'rgba(244, 67, 54, 1)',
                        backgroundColor: 'rgba(244, 67, 54, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: 'rgba(244, 67, 54, 1)',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 7,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const hours = Math.floor(context.parsed.y);
                                    const minutes = Math.round((context.parsed.y - hours) * 60);
                                    return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 0,
                            max: 24,
                            ticks: {
                                stepSize: 2,
                                callback: function(value) {
                                    return `${Math.floor(value).toString().padStart(2, '0')}:00`;
                                }
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    }
                }
            });
        }

        function deleteSession(index) {
            if (confirm('Delete this session?')) {
                sessions.splice(index, 1);
                localStorage.setItem('sessions', JSON.stringify(sessions));
                renderHistory();
                renderCalendar();
            }
        }

        // Calendar rendering
        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            
            document.getElementById('calendar-month').textContent = 
                currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            let html = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']
                .map(d => `<div class="calendar-day-header">${d}</div>`).join('');

            // Adjust firstDay so Monday = 0 (instead of Sunday = 0)
            let adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1;

            // Previous month days
            for (let i = adjustedFirstDay - 1; i >= 0; i--) {
                html += `<div class="calendar-day other-month">${daysInPrevMonth - i}</div>`;
            }

            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                
                const hasSessions = sessions.some(s => {
                    const sessionDate = new Date(s.clockIn);
                    const sessionDateString = `${sessionDate.getFullYear()}-${(sessionDate.getMonth() + 1).toString().padStart(2, '0')}-${sessionDate.getDate().toString().padStart(2, '0')}`;
                    return sessionDateString === dateString;
                });
                
                const isSelected = selectedDate === dateString;
                
                html += `<div class="calendar-day ${hasSessions ? 'has-session' : ''} ${isSelected ? 'selected' : ''}" 
                         onclick="selectDate('${dateString}')">${day}</div>`;
            }

            document.getElementById('calendar-grid').innerHTML = html;

            if (selectedDate) {
                renderCalendarSessions();
            }
        }

        function selectDate(dateString) {
            selectedDate = dateString;
            renderCalendar();
        }

        function renderCalendarSessions() {
            const container = document.getElementById('calendar-sessions');
            
            const dateSessions = sessions.filter(s => {
                const sessionDate = new Date(s.clockIn);
                const sessionDateString = `${sessionDate.getFullYear()}-${(sessionDate.getMonth() + 1).toString().padStart(2, '0')}-${sessionDate.getDate().toString().padStart(2, '0')}`;
                return sessionDateString === selectedDate;
            });

            if (dateSessions.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-text">No sessions on this day</div></div>';
                return;
            }

            const [yearStr, monthStr, dayStr] = selectedDate.split('-');
            const date = new Date(parseInt(yearStr), parseInt(monthStr) - 1, parseInt(dayStr));
            
            container.innerHTML = `
                <div class="history-title" style="margin-bottom: 15px;">
                    ${date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                </div>
                ${dateSessions.map(session => `
                    <div class="session-card">
                        <div class="session-header">
                            <div>
                                <div class="session-name-badge">${session.name || 'Work'}</div>
                            </div>
                            <div class="duration-badge">${session.duration}</div>
                        </div>
                        <div class="time-row">
                            <div class="time-item">
                                <div class="time-label">IN</div>
                                <div class="time-value">${formatTimeShort(session.clockIn)}</div>
                            </div>
                            <div class="time-separator">→</div>
                            <div class="time-item">
                                <div class="time-label">OUT</div>
                                <div class="time-value">${formatTimeShort(session.clockOut)}</div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        function previousMonth() {
            currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1);
            renderCalendar();
        }

        // Initialize
        renderHistory();
        renderCalendar();
    </script>
</body>
</html>
